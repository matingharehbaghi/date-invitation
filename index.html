<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>نامه محرمانه ❤️</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700;800&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="style.css">

</head>

<body>

<div id="app">

<!-- صفحه پاکت -->

<section id="intro"
class="page active">

<div class="envelope">

<img
src="images/envelope.png"
alt="Envelope">

</div>

<h1>

نامه‌ای محرمانه برای شیوا 💌

</h1>

<p>

برای باز کردن کلیک کن ❤️

</p>

</section>

<!-- فرم -->

<section
id="form"
class="page">

<div class="card">

<div class="progress">

<div id="progressBar">

</div>

</div>
<div id="slider">

    <!-- سوال اول -->
    <div class="slide active">

        <img class="topImage" src="images/flower.png">

        <h2>نامه محرمانه</h2>

        <p>این نامه فقط خطاب به شیوا نوشته شده است 🌹</p>

        <h3>با من به یه قرار میای؟</h3>

        <div class="buttons">

            <button class="yes">
                😊 بله
            </button>

            <button class="yes">
                🥰 حتماً
            </button>

            <button id="runaway">
                🙃 نه
            </button>

        </div>

        <div id="message"></div>

    </div>



    <!-- سوال دوم -->

    <div class="slide">

        <img class="topImage"
        src="images/calendar.png">

        <h2>

        چه روزی وقتت خالیه؟

        </h2>

        <input
        id="date"
        type="date">

        <button class="next">

        بعدی ➜

        </button>

    </div>



    <!-- سوال سوم -->

    <div class="slide">

        <img class="topImage"
        src="images/rabbit.png">

        <h2>

        چه ساعتی باشه؟

        </h2>

        <input
        id="time"
        type="time">

        <button class="next">

        بعدی ➜

        </button>

    </div>



    <!-- سوال چهارم -->

    <div class="slide">

        <img class="topImage"
        src="images/forest.png">

        <h2>

        محل قرار؟

        </h2>

        <div class="buttons">

        <button class="place">
        ☕ کافه
        </button>

        <button class="place">
        🍽️ رستوران
        </button>

        <button class="place">
        🎬 سینما
        </button>

        <button class="place">
        ✍️ جای دیگه...
        </button>

        </div>

    </div>
<!-- سوال پنجم -->

<div class="slide">

    <img class="topImage" src="images/lungs.png">

    <h2>انتقادات و پیشنهادات ❤️</h2>

    <textarea
        id="comment"
        placeholder="هرچی دوست داری اینجا بنویس..."
    ></textarea>

    <button class="next">
        بعدی ➜
    </button>

</div>

<!-- پایان -->

<div class="slide">

    <img class="topImage"
         src="images/purpleflower.png">

    <h2>ممنون که وقت گذاشتی 🌹</h2>

    <p>

    (این گل خیلی تلاش کرده به اندازه تو زیبا باشه اما نتونست) ❤️

    </p>

    <button id="submitForm">

        ثبت پاسخ ❤️

    </button>

</div>

</div>

</div>

</section>

</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<script src="script.js"></script>

</body>

</html>
